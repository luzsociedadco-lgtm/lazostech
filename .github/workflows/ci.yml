name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  foundry:
    name: Foundry
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1

      - name: Build
        run: forge build

      - name: Test
        run: forge test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: lazos-frontend
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder
      NEXT_PUBLIC_RPC_URL: https://sepolia.base.org
      NEXT_PUBLIC_WALLETCONNECT_ID: ci-placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lazos-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --workspaces=false --legacy-peer-deps

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=moderate

      - name: Typecheck
        run: npm run check-types

      - name: Build
        run: npm run build
